<!doctype html>
<html lang='en'>
<head>
	<meta charset='utf-8'/>
	<meta
			name='viewport'
			content='width=device-width, initial-scale=1'/>
	<title>Free JSON Formatter - Settings</title>
	<link
			rel='stylesheet'
			href='popup.css'/>
</head>
<body>
<main class='popup'>
	<h1 class='title'>Free JSON Formatter</h1>

	<label
			class='field'
			for='max-mb'>
		<span class='label'>Maximum size to format</span>
		<span class='control'>
          	<input
					id='max-mb'
		            type='number'
		            min='1'
		            max='200'
		            step='1'
		            inputmode='numeric'/>
          <span class='unit'>MB</span>
        </span>
	</label>

	<label
			class='field'
			for='initial-depth'>
		<span class='label'>Initial expanded depth</span>
		<select
				id='initial-depth'
				class='select'>
			<option value='auto'>Auto</option>
			<option value='1'>1 - root only</option>
			<option value='2'>2 levels</option>
			<option value='3'>3 levels</option>
			<option value='4'>4 levels</option>
			<option value='5'>5 levels</option>
			<option value='all'>All</option>
		</select>
	</label>

	<p class='hint'>
		Larger JSON pages are shown as-is to keep the browser responsive. Both settings apply to JSON
		pages you open after changing them; the current page is not reloaded.
	</p>

	<div class='row'>
		<button
				id='reset'
				type='button'
				class='btn'>Reset to default
		</button>
		<output
				id='status'
				class='status'
				aria-live='polite'></output>
	</div>
</main>
<script src='popup.js'></script>
</body>
</html>
